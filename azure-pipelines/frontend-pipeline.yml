trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - client/**

variables:
  - group: pernstore-variables
  - name: imageTag
    value: $(Build.BuildId)
  - name: VITE_API_URL
    value: 'https://app-pernstore-backend-iqra-hnahbvf2d0fzeqdh.eastasia-01.azurewebsites.net'

stages:
  - stage: Build
    displayName: 'Build and Push Frontend Image'
    jobs:
      - job: BuildJob
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: Docker@2
            displayName: 'Build and Push Frontend Image'
            inputs:
              command: buildAndPush
              containerRegistry: acr-service-connection
              repository: $(FRONTEND_IMAGE_NAME)
              dockerfile: client/Dockerfile
              buildContext: client/
              tags: |
                $(imageTag)
                latest

  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProdJob
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureStaticWebApp@0
                  displayName: 'Deploy Frontend to Static Web App'
                  inputs:
                    azure_static_web_apps_api_token: $(STATIC_WEB_APP_TOKEN)
                    app_location: 'client'
                    output_location: 'dist'
                    app_build_command: 'npm run build -- --mode production'