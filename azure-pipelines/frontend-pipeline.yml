trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - client/**

variables:
  - group: pernstore-variables
  - name: imageTag
    value: $(Build.BuildId)

stages:
  - stage: Build
    displayName: 'Build and Push Frontend Image'
    jobs:
      - job: BuildJob
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: login
              containerRegistry: acr-service-connection

          - task: Docker@2
            displayName: 'Build Frontend Image'
            inputs:
              command: build
              repository: $(DOCKER_REGISTRY)/$(FRONTEND_IMAGE_NAME)
              dockerfile: client/Dockerfile
              buildContext: client/
              arguments: --build-arg VITE_API_URL=https://app-pernstore-backend-iqra.azurewebsites.net
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: 'Push Frontend Image to ACR'
            inputs:
              command: push
              repository: $(DOCKER_REGISTRY)/$(FRONTEND_IMAGE_NAME)
              tags: |
                $(imageTag)
                latest

  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProdJob
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureStaticWebApp@0
                  displayName: 'Deploy Frontend to Static Web App'
                  inputs:
                    azure_static_web_apps_api_token: $(STATIC_WEB_APP_TOKEN)
                    app_location: '/client'
                    output_location: 'dist'